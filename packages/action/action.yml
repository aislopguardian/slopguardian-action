name: "SlopGuardian"
description: "Catches AI-generated slop in PRs and issues. 30+ checks, 4 verdict tiers, no AI required."
author: "slopguardian"

branding:
  icon: "shield"
  color: "red"

inputs:
  github-token:
    description: "GitHub token for API calls and posting comments"
    required: true
  config:
    description: "Path to .slopguardian.yml config file"
    required: false
    default: ".slopguardian.yml"
  profile:
    description: "Preset config profile: strict, balanced, relaxed, monitor-only"
    required: false
    default: "balanced"
  fail-on-error:
    description: "Fail the check if score exceeds fail threshold"
    required: false
    default: "true"
  fail-threshold:
    description: "Score at or above this triggers failure (overrides config)"
    required: false
  warn-threshold:
    description: "Score at or above this triggers warning (overrides config)"
    required: false
  review-threshold:
    description: "Score at or above this triggers needs-review (overrides config)"
    required: false
  ai-key:
    description: "API key for optional LLM analysis (OpenRouter or direct provider)"
    required: false
  ai-provider:
    description: "AI provider: openrouter, openai, anthropic, ollama, custom"
    required: false
    default: "openrouter"
  ai-model:
    description: "Model identifier for AI analysis"
    required: false
  honeypot-terms:
    description: "Comma-separated trap words to detect in PR body"
    required: false
  exempt-users:
    description: "Comma-separated GitHub usernames that bypass all checks"
    required: false
  exempt-labels:
    description: "Labels that bypass all checks"
    required: false
    default: "human-verified"
  blocked-users:
    description: "Comma-separated usernames to auto-close without analysis"
    required: false
  trusted-users:
    description: "Comma-separated usernames with 0.5x score multiplier"
    required: false
  blocked-source-branches:
    description: "PRs from these branches get flagged"
    required: false
    default: "main,master"
  exclude-collaborators:
    description: "Skip analysis for repo collaborators"
    required: false
    default: "true"
  contributor-history-check:
    description: "Enable stricter scoring for new contributors"
    required: false
    default: "true"
  new-contributor-multiplier:
    description: "Score multiplier for users with 0 merged PRs"
    required: false
    default: "1.5"
  repeat-offender-threshold:
    description: "Past slop closures before escalation"
    required: false
    default: "3"
  repeat-offender-multiplier:
    description: "Score multiplier for repeat offenders"
    required: false
    default: "2.0"
  grace-period-hours:
    description: "Hours before auto-close (0 = immediate)"
    required: false
    default: "0"
  check-metadata-paths:
    description: "Flag PRs that only modify metadata files (README, LICENSE, etc.)"
    required: false
    default: "true"
  check-title-quality:
    description: "Flag generic, overlong, or emoji-heavy PR titles"
    required: false
    default: "true"
  check-description-quality:
    description: "Flag empty, too-short, or excessively long PR descriptions"
    required: false
    default: "true"
  check-added-comments:
    description: "Flag high comment-to-code ratio in added lines"
    required: false
    default: "true"
  check-spam-username:
    description: "Flag usernames matching spam patterns (low-confidence signal)"
    required: false
    default: "true"
  check-template-compliance:
    description: "Flag uncompleted or bulk-checked PR template checkboxes"
    required: false
    default: "true"
  on-warn:
    description: "Actions on suspicious verdict (comma-separated: label, comment)"
    required: false
    default: "label,comment"
  on-needs-review:
    description: "Actions on needs-review verdict (comma-separated: label, comment)"
    required: false
    default: "label,comment"
  on-close:
    description: "Actions on likely-slop verdict (comma-separated: label, comment, close)"
    required: false
    default: "label,comment,close"

outputs:
  verdict:
    description: "clean, suspicious, needs-review, or likely-slop"
  score:
    description: "Total weighted score"
  signal-count:
    description: "Number of signals detected"
  report:
    description: "Markdown report"

runs:
  using: "node20"
  main: "dist-action/index.js"
