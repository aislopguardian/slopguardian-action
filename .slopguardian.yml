version: 1

thresholds:
  warn: 6
  fail: 12

detectors:
  lexical:
    enabled: true
    languages: [en]
  structural:
    enabled: true
    duplicate-threshold: 0.85
  semantic:
    enabled: true
    max-filler-ratio: 0.3
    max-hedging-density: 0.2
  code-smell:
    enabled: true
    max-comment-ratio: 0.4
    flag-generic-names: true

include:
  - "packages/**/*.ts"
  - "**/*.md"
  - "**/*.yml"
  - "**/*.yaml"

exclude:
  - "node_modules/**"
  - "dist/**"
  - "**/fixtures/**"
